# ci.yml — always-green PR gate.
# Runs ONLY tenant-free checks: Python unit tests + Bicep syntax validation.
# Playwright is intentionally in a separate workflow (playwright.yml) so each
# workflow demonstrates one pattern cleanly.

name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '**/*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '**/*.md']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/functions
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/functions/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest

  bicep-validate:
    name: Bicep syntax validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Bicep CLI
        run: |
          curl -sLO https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep-linux-x64
          sudo mv bicep-linux-x64 /usr/local/bin/bicep
          bicep --version
      - name: Build (syntax check)
        run: bicep build infra/bicep/main.bicep --outfile /tmp/main.compiled.json
      - name: Show compiled summary
        run: |
          echo "## Bicep build OK ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`bicep build infra/bicep/main.bicep\` produced $(wc -c < /tmp/main.compiled.json) bytes of ARM JSON." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Syntax validation only. Tenant-aware checks (\`what-if\`) require credentials and are out of scope for this demo's CI." >> $GITHUB_STEP_SUMMARY
