# sync-issues-to-ado.yml — manual-only ADO sync.
# Demonstrates the danhellem/github-actions-issue-to-work-item pattern.
# This workflow is intentionally workflow_dispatch-only and guarded so it never
# fires in CI without explicit Entra ID configuration.

name: Sync GitHub Issues → Azure DevOps (manual)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number to sync'
        required: true
        type: number

permissions:
  id-token: write
  issues: write
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.check.outputs.can_run }}
    steps:
      - id: check
        env:
          ENTRA_APP_CLIENT_ID: ${{ secrets.ENTRA_APP_CLIENT_ID }}
          ADO_ORG: ${{ vars.ADO_ORGANIZATION }}
        run: |
          if [ -n "$ENTRA_APP_CLIENT_ID" ] && [ -n "$ADO_ORG" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "## ⚠️ Sync skipped — Entra ID / ADO not configured" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Set \`ENTRA_APP_CLIENT_ID\` (Secret) and \`ADO_ORGANIZATION\` (Variable) to enable. See [docs/03-spec-driven-dev.md](../../docs/03-spec-driven-dev.md)." >> "$GITHUB_STEP_SUMMARY"
          fi

  sync:
    needs: preflight
    if: needs.preflight.outputs.can_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ENTRA_APP_CLIENT_ID }}
          tenant-id: ${{ secrets.ENTRA_APP_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Azure DevOps token
        id: token
        run: |
          # 499b84ac-1321-427f-aa17-267ca6975798 = Azure DevOps resource ID (fixed)
          TOKEN=$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query 'accessToken' -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ado_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: danhellem/github-actions-issue-to-work-item@master
        env:
          ado_token: ${{ steps.token.outputs.ado_token }}
          github_token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ado_organization: ${{ vars.ADO_ORGANIZATION }}
          ado_project: ${{ vars.ADO_PROJECT }}
          ado_wit: 'User Story'
          ado_new_state: 'New'
          ado_active_state: 'Active'
          ado_close_state: 'Closed'
          ado_bypassrules: 'true'
