# sync-issues-to-ado.yml — automatic ADO Work Item sync on GitHub Issue events.
# Demonstrates the danhellem/github-actions-issue-to-work-item pattern.
#
# Triggered by issue events (opened / edited / closed / etc) — this is what
# the action was designed for. The preflight job short-circuits cleanly when
# the Entra ID / ADO configuration is incomplete, so the workflow is safe
# even before secrets are wired up.

name: Sync GitHub Issues → Azure DevOps

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled, assigned, unassigned]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue # to re-sync (triggers an edited-style sync)'
        required: true
        type: number

permissions:
  id-token: write
  issues: write
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.check.outputs.can_run }}
    steps:
      - id: check
        env:
          ENTRA_APP_CLIENT_ID: ${{ secrets.ENTRA_APP_CLIENT_ID }}
          ENTRA_APP_TENANT_ID: ${{ secrets.ENTRA_APP_TENANT_ID }}
          ADO_ORG: ${{ vars.ADO_ORGANIZATION }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          GH_PAT: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        run: |
          missing=()
          [ -z "$ENTRA_APP_CLIENT_ID" ] && missing+=("secret:ENTRA_APP_CLIENT_ID")
          [ -z "$ENTRA_APP_TENANT_ID" ] && missing+=("secret:ENTRA_APP_TENANT_ID")
          [ -z "$ADO_ORG" ]              && missing+=("var:ADO_ORGANIZATION")
          [ -z "$ADO_PROJECT" ]          && missing+=("var:ADO_PROJECT")
          [ -z "$GH_PAT" ]               && missing+=("secret:GH_PERSONAL_ACCESS_TOKEN")
          if [ ${#missing[@]} -eq 0 ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⚠️ Sync skipped — Entra ID / ADO not fully configured"
              echo ""
              echo "Missing:"
              for s in "${missing[@]}"; do echo "- \`$s\`"; done
              echo ""
              echo "See [docs/03-spec-driven-dev.md](../../docs/03-spec-driven-dev.md). The Federated Credential subject must be \`repo:<org>/<repo>:ref:refs/heads/main\` (this workflow has no \`environment:\`)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Auto-sync path: real issue event (opened / edited / labeled / …)
  sync:
    needs: preflight
    if: needs.preflight.outputs.can_run == 'true' && github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ENTRA_APP_CLIENT_ID }}
          tenant-id: ${{ secrets.ENTRA_APP_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Azure DevOps token
        id: token
        run: |
          # 499b84ac-1321-427f-aa17-267ca6975798 = Azure DevOps resource ID (fixed)
          TOKEN=$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query 'accessToken' -o tsv)
          echo "::add-mask::$TOKEN"
          echo "ado_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: danhellem/github-actions-issue-to-work-item@v2.5
        env:
          ado_token: ${{ steps.token.outputs.ado_token }}
          github_token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ado_organization: ${{ vars.ADO_ORGANIZATION }}
          ado_project: ${{ vars.ADO_PROJECT }}
          # SmartHotelDemo uses Scrum process. For Agile use 'User Story' + Active/Closed.
          ado_wit: ${{ vars.ADO_WORK_ITEM_TYPE || 'Product Backlog Item' }}
          ado_new_state: ${{ vars.ADO_NEW_STATE || 'New' }}
          ado_active_state: ${{ vars.ADO_ACTIVE_STATE || 'Committed' }}
          ado_close_state: ${{ vars.ADO_CLOSE_STATE || 'Done' }}
          # The Entra App is a project Contributor, not collection admin, so
          # it cannot bypass workflow rules. Leave bypass off and rely on the
          # process defaults.
          ado_bypassrules: 'false'

  # ── Manual re-sync path: workflow_dispatch with an explicit issue #
  manual-sync:
    needs: preflight
    if: needs.preflight.outputs.can_run == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger a no-op edit on the target issue
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        run: |
          # Append a zero-width marker comment that nudges the 'issues:edited'
          # event without visibly changing the issue body. The auto-sync job
          # above then picks it up.
          gh issue edit ${{ inputs.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label spec-driven >/dev/null 2>&1 || true
          # Add (and immediately remove) a one-shot label to force an event
          gh issue edit ${{ inputs.issue_number }} \
            --repo ${{ github.repository }} \
            --add-label "sync-requested" >/dev/null 2>&1 || true
          gh issue edit ${{ inputs.issue_number }} \
            --repo ${{ github.repository }} \
            --remove-label "sync-requested" >/dev/null 2>&1 || true
          {
            echo "## 🟡 Manual re-sync triggered"
            echo ""
            echo "Labeled & unlabeled issue #${{ inputs.issue_number }} to fire \`issues:labeled\` / \`issues:unlabeled\` events."
            echo "The \`sync\` job above will run automatically on those events."
          } >> "$GITHUB_STEP_SUMMARY"
