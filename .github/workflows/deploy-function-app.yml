name: '[Reusable] Deploy Azure Function App'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      function-app-name:
        required: true
        type: string
      resource-group:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.11'
      dry_run:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: app/functions/requirements.txt
      - name: Install deps
        working-directory: app/functions
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"
      - uses: actions/upload-artifact@v4
        with:
          name: function-package-${{ inputs.environment }}
          path: app/functions
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: function-package-${{ inputs.environment }}
          path: ./package
      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: echo "dry-run for ${{ inputs.environment }}"
