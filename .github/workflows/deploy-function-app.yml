# deploy-function-app.yml — REUSABLE workflow.
# Called by deploy-caller.yml (or other repos via uses:).
# Has no trigger of its own → cannot run accidentally.

name: '[Reusable] Deploy Azure Function App'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: GitHub Environment name (development | staging | production)
      function-app-name:
        required: true
        type: string
      resource-group:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.11'
      dry-run:
        required: false
        type: boolean
        default: true
        description: When true, build & validate only — skip the deploy step.
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: app/functions/requirements.txt
      - run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"
      - run: pytest -q
      - uses: actions/upload-artifact@v4
        with:
          name: function-package-${{ inputs.environment }}
          path: app/functions
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write   # required for OIDC
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: function-package-${{ inputs.environment }}
          path: ./package

      - name: Azure Login (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Functions
        if: ${{ !inputs.dry-run }}
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ inputs.function-app-name }}
          package: ./package
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Dry-run summary (no deploy performed)
        if: ${{ inputs.dry-run }}
        run: |
          {
            echo "## 🟡 Dry-run completed — no Azure resources were modified"
            echo ""
            echo "| Setting | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Function App | \`${{ inputs.function-app-name }}\` |"
            echo "| Resource Group | \`${{ inputs.resource-group }}\` |"
            echo "| Python | \`${{ inputs.python-version }}\` |"
            echo ""
            echo "To actually deploy, re-run with \`dry-run=false\` and configure \`AZURE_CLIENT_ID\` / \`AZURE_TENANT_ID\` / \`AZURE_SUBSCRIPTION_ID\` as Environment secrets, plus a Federated Credential whose \`subject\` matches \`repo:<org>/<repo>:environment:${{ inputs.environment }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
