name: '[Reusable] Deploy Azure Function App'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      function-app-name:
        required: true
        type: string
      resource-group:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.11'
      dry_run:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "build for ${{ inputs.function-app-name }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - run: echo "would deploy to ${{ inputs.environment }} dry=${{ inputs.dry_run }}"
