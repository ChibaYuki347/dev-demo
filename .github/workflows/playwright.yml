# playwright.yml — sharded Playwright E2E with merge-reports + PR comment.
# Demonstrates Topic ① from the research report (no real cloud required).
#
# - blob reporter per shard
# - merge-reports into a single HTML + GitHub annotations
# - PR comment via daun/playwright-report-summary (only when run by a PR)

name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # for daun/playwright-report-summary to comment
  checks: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: shards ──────────────────────────────────────────────
  e2e:
    name: 'Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app/frontend
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: 'true'

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: app/frontend/blob-report/
          retention-days: 1

  # ─── Phase 2: merge ───────────────────────────────────────────────
  merge-reports:
    name: Merge reports
    if: ${{ !cancelled() }}
    needs: [e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: app/frontend/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML + GitHub annotations
        run: npx playwright merge-reports --reporter html,github ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: app/frontend/playwright-report/
          retention-days: 14

      - name: Add report URL to Job Summary
        run: |
          {
            echo "## 🎭 Playwright Report"
            echo ""
            echo "Download \`html-report--attempt-${{ github.run_attempt }}\` from the Artifacts section."
            echo ""
            echo "Open locally with: \`npx playwright show-report <extracted-folder>\`"
          } >> "$GITHUB_STEP_SUMMARY"
