# deploy-caller.yml — caller for the reusable deploy-function-app.yml.
# Manual-only (workflow_dispatch). Defaults to dry-run so an accidental click
# does not touch a real Azure tenant.
# Gated on AZURE_CLIENT_ID presence so it short-circuits cleanly in a clone
# of this repo that has no Azure config yet.

name: Deploy Function App (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: development
        type: choice
        options: [development, staging, production]
      dry_run:
        description: 'Dry-run (skip Azure login + deploy)'
        required: true
        default: true
        type: boolean

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - id: check
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$CLIENT_ID" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "## ⚠️ Skipping deploy — \`AZURE_CLIENT_ID\` secret is empty" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure the Federated Credential and add \`AZURE_CLIENT_ID\`, \`AZURE_TENANT_ID\`, \`AZURE_SUBSCRIPTION_ID\` to the \`${{ inputs.environment }}\` Environment to enable real deploys." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.can_deploy == 'true'
    uses: ./.github/workflows/deploy-function-app.yml
    with:
      environment: ${{ inputs.environment }}
      function-app-name: fjdemo-func-${{ inputs.environment == 'development' && 'dev' || inputs.environment == 'staging' && 'stg' || 'prod' }}
      resource-group: fjdemo-rg-${{ inputs.environment == 'development' && 'dev' || inputs.environment == 'staging' && 'stg' || 'prod' }}
      dry-run: ${{ inputs.dry_run }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
