# deploy-caller.yml — caller for the reusable deploy-function-app.yml.
# Manual-only (workflow_dispatch). Defaults to dry-run so an accidental click
# does not touch a real Azure tenant.
#
# Note: the preflight that validates AZURE_CLIENT_ID lives INSIDE the reusable
# workflow's deploy job, because Environment secrets are only visible to a job
# with `environment:` set. Checking them from a no-environment job would
# always fail (the secret would appear empty even if configured correctly).

name: Deploy Function App (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: development
        type: choice
        options: [development, staging, production]
      dry_run:
        description: 'Dry-run (skip Azure login + deploy)'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    uses: ./.github/workflows/deploy-function-app.yml
    with:
      environment: ${{ inputs.environment }}
      function-app-name: devdemo-func-${{ inputs.environment == 'development' && 'dev' || inputs.environment == 'staging' && 'stg' || 'prod' }}
      resource-group: devdemo-rg-${{ inputs.environment == 'development' && 'dev' || inputs.environment == 'staging' && 'stg' || 'prod' }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
