# deploy-caller.yml — caller for the reusable deploy-function-app.yml.
# Manual-only (workflow_dispatch). Defaults to dry-run so an accidental click
# does not touch a real Azure tenant.

name: Deploy Function App (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: development
        type: choice
        options: [development, staging, production]
      dry_run:
        description: 'Dry-run (skip Azure login + deploy)'
        required: true
        default: true
        type: boolean

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      env_short: ${{ steps.map.outputs.short }}
    steps:
      - id: map
        env:
          ENV: ${{ inputs.environment }}
        run: |
          case "$ENV" in
            development) short=dev ;;
            staging)     short=stg ;;
            production)  short=prod ;;
            *) echo "unknown env: $ENV"; exit 1 ;;
          esac
          echo "short=$short" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prep
    # IMPORTANT: A reusable workflow's job cannot ask for MORE permissions
    # than its caller. The OIDC flow requires id-token: write on BOTH the
    # called job AND this caller job. Without this block GitHub rejects the
    # workflow at startup with "workflow file issue".
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function-app.yml
    with:
      environment: ${{ inputs.environment }}
      function-app-name: devdemo-func-${{ needs.prep.outputs.env_short }}
      resource-group: devdemo-rg-${{ needs.prep.outputs.env_short }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
